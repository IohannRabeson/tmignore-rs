[package]
name = "tmignore-rs"
description = "A drop in replacement for tmignore"
version = "0.1.0"
edition = "2024"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
crossbeam-channel = "0.5.15"
dirs = "6.0.0"
ignore = { version = "0.4", features = ["simd-accel"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shellexpand = "3.1.1"
thiserror = "2"

[dev-dependencies]
temp-dir-builder = { git = "https://github.com/IohannRabeson/temp-dir-builder", rev = "0eb3527" }
