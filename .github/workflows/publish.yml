name: Publish

on:
  release:
    types: [published]
  # Uncomment to debug
  # push:
env:
  CARGO_TERM_COLOR: always
  TMIGNORE_RS_VERSION: ${{ github.ref_name }}

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust-target: aarch64-apple-darwin
            label: aarch64
          - rust-target: x86_64-apple-darwin
            label: x86-64
    env:
      executable_output_file_path: "target/${{ matrix.rust-target }}/final/tmignore-rs"
      zip_output_file_path: "tmignore-rs_${{ github.ref_name }}_${{ matrix.label }}.zip"
      sha256_output_file_path: "sha256-${{ matrix.label }}.txt"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.rust-target }}
      - name: Rust Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release
      - name: Build
        run: cargo build --profile=final --verbose --locked --target ${{ matrix.rust-target }}
      - name: Copy Binary
        run: cp ${{ env.executable_output_file_path }} .
      - name: Zip
        run: zip ${{ env.zip_output_file_path }} tmignore-rs LICENSE README.md
      - name: Upload Release Asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} ${{ env.zip_output_file_path }}
      - name: Compute SHA256
        run: shasum -a 256 ${{ env.zip_output_file_path }} | awk '{print $1}' > ${{ env.sha256_output_file_path }}
      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sha256-${{ matrix.label }}
          path: ${{ env.sha256_output_file_path }}

  update-formula:
    if: github.event_name == 'release' && github.event.release.prerelease == false
    needs: publish
    uses: ./.github/workflows/homebrew.yml
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}