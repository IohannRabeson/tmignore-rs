name: Publish

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  TMIGNORE_RS_VERSION: ${{ github.ref_name }}
jobs:
  publish:
    permissions:
      contents: write
    runs-on: "macos-latest"
    strategy:
      fail-fast: false
      matrix:
        include:
        - rust-target: aarch64-apple-darwin
          label: aarch64
        - rust-target: x86_64-apple-darwin
          label: x86-64
    env:
      executable_output_file_path: "target/${{ matrix.rust-target }}/release/tmignore-rs"
      zip_output_file_path: "tmignore-rs_${{ github.ref_name }}_${{ matrix.label }}.zip"
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust-target }}
    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: release_${{ matrix.rust-target }}
    - name: Build
      run: cargo build --release --verbose --locked --target ${{ matrix.rust-target }}
    - name: Copy Binary
      run: cp ${{ env.executable_output_file_path }} .
    - name: Zip
      uses: thedoctor0/zip-release@0.7.6
      with:
        type: "zip"
        path: tmignore-rs LICENSE README.md
        filename: ${{ env.zip_output_file_path }}
    - name: Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ${{ env.zip_output_file_path }}
        tag: ${{ github.ref_name }}
        
    